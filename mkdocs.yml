site_name: RegenTwin
site_description: Платформа симуляции регенерации тканей (SDE + ABM + терапии PRP/PEMF)
site_url: https://regentwin.local/
repo_url: https://github.com/RageBober/RegenTwin
repo_name: RageBober/RegenTwin
edit_uri: edit/master/docs/

docs_dir: docs
exclude_docs: |
  _archive/

theme:
  name: material
  language: ru
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Светлая тема
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: ru
  - i18n:
      docs_structure: suffix
      languages:
        - locale: ru
          name: Русский
          default: true
        - locale: en
          name: English
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_signature_annotations: true
            members_order: source
            separate_signature: true
  - glightbox

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Главная: index.md
  - Старт:
      - getting-started/installation.md
      - getting-started/first-simulation.md
      - getting-started/troubleshooting.md
  - Архитектура:
      - architecture/overview.md
      - architecture/mathematical-framework.md
      - architecture/sde-model.md
      - architecture/abm-model.md
      - architecture/monte-carlo.md
      - architecture/sensitivity.md
      - architecture/validation.md
  - Туториалы:
      - tutorials/run-simulation.md
      - tutorials/add-therapy.md
      - tutorials/interpret-results.md
  - API Reference:
      - api-reference/index.md
      - api-reference/extended-sde.md
      - api-reference/abm.md
      - api-reference/monte-carlo.md
  - Бенчмарки: benchmarks/index.md
  - Changelog: changelog.md
