default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(tests/fixtures/.*|.*\.fcs)$
      - id: end-of-file-fixer
        exclude: ^(tests/fixtures/.*|.*\.fcs)$
      - id: check-merge-conflict
      - id: check-yaml
        exclude: ^mkdocs\.yml$
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
        exclude: ^(uv\.lock|tests/fixtures/.*|ui/package-lock\.json)$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        # `--exit-zero` пока разгребается legacy backlog (G001/E402/F841/E741).
        # CI запускает `ruff check` строго; снимется после Phase 8.x cleanup.
        args: ["--fix", "--exit-zero"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy src/
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]

      - id: eslint-frontend
        name: eslint (ui)
        entry: bash -c 'cd ui && npm run lint'
        language: system
        files: ^ui/src/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false
        stages: [pre-push]
