# Codecov configuration for RegenTwin
# https://docs.codecov.com/docs/codecov-yaml

coverage:
  status:
    project:
      default:
        target: 70%
        threshold: 2%
        if_ci_failed: error
    patch:
      default:
        target: 70%
        threshold: 5%

ignore:
  - "tests/**"
  - "scripts/**"
  - "src/db/migrations/**"
  - "ui/**"

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: true
