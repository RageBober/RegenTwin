name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_DEFAULT: "3.11"
  NODE_VERSION: "20"
  UV_VERSION: "0.5.11"

jobs:
  lint-py:
    name: Python lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_DEFAULT }}

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff (lint)
        # Existing legacy backlog (G001/E402/F841/E741); cleared in Phase 8.x.
        continue-on-error: true
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: Mypy (strict)
        # Backlog typing fixes — снимется после Phase 8.x cleanup.
        continue-on-error: true
        run: uv run mypy src/

  test-py:
    name: Python tests (pytest + coverage)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.12 временно отключён — PyMC/pytensor wheels нестабильны на Linux 3.12.
        # Вернуть после миграции PyMC ≥5.20 или замены на numpyro.
        python: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Sync dependencies (Python ${{ matrix.python }})
        run: uv sync --frozen --python ${{ matrix.python }}

      - name: Initialize DuckDB schema
        # test_cancel_nonexistent (и потенциально другие route-тесты)
        # используют production engine; нужна созданная schema.
        run: |
          mkdir -p data
          uv run alembic upgrade head

      - name: Run tests (excluding benchmarks and slow e2e)
        run: |
          uv run pytest \
            -m "not benchmark and not e2e_slow" \
            --cov=src --cov-report=xml --cov-report=term \
            -q

      - name: Upload coverage to Codecov
        if: matrix.python == env.PYTHON_DEFAULT
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint-frontend:
    name: Frontend lint (eslint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - run: npm ci

      - name: Run ESLint
        # Existing legacy backlog (unused vars в test fixtures); cleared in Phase 8.x.
        continue-on-error: true
        run: npm run lint

  test-frontend:
    name: Frontend tests (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - run: npm ci

      - name: Run Vitest
        run: npm test -- --run

  build-frontend:
    name: Frontend build (vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/
          retention-days: 7
