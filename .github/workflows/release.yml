name: Release (Tauri MSI)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build, e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: write    # GH Release create/upload

jobs:
  build-tauri-windows:
    name: Build Tauri MSI (Windows)
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      # MSVC environment — без этого Rust linker не находит link.exe.
      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.11"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Sync Python deps (no dev) — bundled into MSI
        run: uv sync --frozen --no-dev

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Set up Rust toolchain (msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ui/src-tauri -> target

      - name: npm ci
        working-directory: ui
        run: npm ci

      # Официальный tauri-action: сам ставит wix3, тестирует, билдит и
      # аплоадит .msi/.exe в GitHub Release с тем же тегом.
      - name: Build & publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ui
          tagName: ${{ github.ref_name }}
          releaseName: "RegenTwin ${{ github.ref_name }}"
          releaseBody: |
            Автоматическая сборка Tauri MSI / NSIS для Windows.

            Установка: скачать `*-setup.msi`, дважды кликнуть, согласиться с
            предупреждением "Unknown publisher" (нет code signing для дипломки).
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
