name: Release (Tauri MSI)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build, e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: write    # GH Release create/upload

jobs:
  build-tauri-windows:
    name: Build Tauri MSI (Windows)
    # windows-2022 вместо windows-latest: на 2025-image MSVC layout другой,
    # Rust cc-crate всё равно ищет Community-путь и падает.
    runs-on: windows-2022
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      # MSVC environment — без этого Rust linker не находит link.exe.
      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.11"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.11
        run: uv python install 3.11

      # Bundling .venv from `uv sync` is broken in production:
      # pyvenv.cfg references uv-managed Python at C:\Users\runneradmin\...
      # which doesn't exist on the user's machine → "No Python at ..." crash.
      # Instead: copy the standalone Python distribution itself, install deps
      # directly into its site-packages, and ship that as a portable runtime.
      - name: Build portable Python runtime
        shell: pwsh
        run: |
          $pyExe = (uv python find 3.11).Trim()
          $pyHome = Split-Path -Parent $pyExe
          Write-Host "uv-managed Python at: $pyHome"

          $runtime = "python-runtime"
          if (Test-Path $runtime) { Remove-Item -Recurse -Force $runtime }
          Copy-Item -Recurse $pyHome $runtime
          Write-Host "Copied to: $runtime"

          # Bootstrap pip inside the portable runtime
          & "$runtime\python.exe" -m ensurepip --upgrade
          & "$runtime\python.exe" -m pip install --upgrade pip --no-warn-script-location

          # Export locked deps (no dev, no project itself) and install into the
          # runtime's site-packages. --no-emit-project: regentwin is installed
          # separately via `pip install .` below.
          uv export --frozen --no-dev --no-emit-project --format requirements-txt --output-file req-bundle.txt
          & "$runtime\python.exe" -m pip install -r req-bundle.txt --no-warn-script-location --no-deps
          # Install regentwin itself (project root) without re-resolving deps
          & "$runtime\python.exe" -m pip install --no-deps --no-warn-script-location .

          # Smoke test: importable + uvicorn entry exists
          & "$runtime\python.exe" -c "import src.api.main; import uvicorn; print('runtime ok')"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      # Удалить любой stale .cargo/config с hardcoded путями к VS Community.
      - name: Wipe stale cargo configs
        shell: pwsh
        run: |
          $cfg = "$env:USERPROFILE\.cargo\config.toml"
          if (Test-Path $cfg) {
            Write-Host "Removing $cfg"
            Get-Content $cfg
            Remove-Item $cfg -Force
          }
          $cfg2 = "$env:USERPROFILE\.cargo\config"
          if (Test-Path $cfg2) {
            Remove-Item $cfg2 -Force
          }

      # Чистая установка Rust toolchain через actions-rust-lang
      # (без зависимости от pre-installed rustup на runner image).
      - name: Set up Rust toolchain (clean)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ui/src-tauri -> target
          prefix-key: v3-rust-msvc-cleanenv

      - name: npm ci
        working-directory: ui
        run: npm ci

      # Build с явным linker override — cargo должен использовать link.exe
      # из PATH (msvc-dev-cmd добавил), а не hardcoded путь Community.
      - name: Build & publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER: link.exe
          CC: cl.exe
          CXX: cl.exe
          RUSTFLAGS: "-C linker=link.exe"
        with:
          projectPath: ui
          tagName: ${{ github.ref_name }}
          releaseName: "RegenTwin ${{ github.ref_name }}"
          releaseBody: |
            Автоматическая сборка Tauri MSI / NSIS для Windows.

            Установка: скачать `*-setup.msi`, дважды кликнуть, согласиться с
            предупреждением "Unknown publisher" (нет code signing для дипломки).
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
