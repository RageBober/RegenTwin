name: Release (Tauri MSI)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build, e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: write    # GH Release create/upload

jobs:
  build-tauri-windows:
    name: Build Tauri MSI (Windows)
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.11"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Sync Python deps (no dev) — bundled into MSI
        run: uv sync --frozen --no-dev

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ui/src-tauri -> target

      - name: npm ci
        working-directory: ui
        run: npm ci

      - name: Build Tauri (msi + nsis)
        working-directory: ui
        run: npm run tauri:build

      - name: Collect bundle artefacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artefacts | Out-Null
          Get-ChildItem -Recurse -Path ui/src-tauri -Include *.msi,*.exe `
            | Where-Object { $_.FullName -match "release\\bundle\\(msi|nsis)" } `
            | Copy-Item -Destination artefacts -Force
          Get-ChildItem artefacts

      - name: Upload as workflow artefact
        uses: actions/upload-artifact@v4
        with:
          name: regentwin-windows-${{ github.ref_name }}
          path: artefacts/*
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artefacts/*
          generate_release_notes: true
          body_path: CHANGELOG.md
          fail_on_unmatched_files: true
